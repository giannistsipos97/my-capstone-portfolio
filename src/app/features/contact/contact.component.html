<section
  class="min-h-screen bg-slate-950 text-slate-200 flex items-center justify-center"
>
  <div class="max-w-3xl w-full">
    <div class="mb-12">
      <h2 class="text-5xl font-bold text-white mb-6">
        Contact <span class="text-indigo-500">Information</span>
      </h2>
      <div class="h-1 w-24 bg-indigo-500 rounded"></div>
      <p class="mt-6 text-slate-400 text-lg max-w-xl">
        Below you will find my contact information. Feel free to reach out to me
        via phone, email, or connect with me on LinkedIn and GitHub. I look
        forward to hearing from you!
      </p>
    </div>

    <div class="space-y-8 mt-12">
      <div
        class="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 group"
      >
        <span class="text-indigo-500 font-mono tracking-widest text-xl w-24"
          >Phone</span
        >
        <span
          class="text-2xl md:text-3xl font-medium text-slate-300 hover:text-white transition-colors"
        >
          {{ phone }}
        </span>
      </div>

      <div
        class="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 group"
      >
        <span class="text-indigo-500 font-mono tracking-widest text-xl w-24"
          >Email</span
        >
        <span
          class="text-2xl md:text-3xl font-medium text-slate-300 hover:text-white transition-colors"
        >
          {{ email }}
        </span>
      </div>

      <div
        class="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 group"
      >
        <span class="text-indigo-500 font-mono tracking-widest text-xl w-24"
          >LinkedIn</span
        >
        <a
          href="https://{{ linkedin }}"
          target="_blank"
          class="text-2xl md:text-3xl font-medium text-slate-300 hover:text-white transition-colors"
        >
          {{ linkedin }}
        </a>
      </div>

      <div
        class="flex flex-col md:flex-row md:items-center gap-2 md:gap-6 group"
      >
        <span class="text-indigo-500 font-mono tracking-widest text-xl w-24"
          >GitHub</span
        >
        <a
          href="https://github.com/giannistsipos97"
          target="_blank"
          class="text-2xl md:text-3xl font-medium text-slate-300 hover:text-white transition-colors"
        >
          {{ github }}
        </a>
      </div>
    </div>
  </div>
</section>
